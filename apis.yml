description: >-
  Calumet, Inc. (NASDAQ: CLMT) is a publicly traded U.S. manufacturing company
  established in 1919, headquartered in Indianapolis, Indiana. The firm
  specializes in the manufacture of lubricating oils, solvents, waxes, packaged
  and synthetic specialty products, fuels, renewable diesel, and fuel-related
  products. It operates 12 production facilities across North America and
  serves approximately 2,700 global customers in over 90 countries through
  brands including Royal Purple, Bel-Ray, Penreco, Orchex, and TruFuel. Calumet
  does not publish a public developer API program; commercial integrations are
  handled via B2B portals and EDI.
